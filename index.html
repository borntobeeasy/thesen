<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bundesliga · Rasenschach 26/27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700;800&family=VT323&display=swap" rel="stylesheet" />
  <style>
    /* ============================
       TOKENS – heller Hintergrund, dunkle Schrift
       ============================ */
    :root {
      color-scheme: light;
      --night: #f5f5f5;
      --night-2: #eaeaea;
      --bundesliga-red: #e2001a;
      --bundesliga-red-dark: #9e0008;
      --bundesliga-gold: #ffcc00;
      --zone-cl: #1e5fae;
      --zone-el: #f7941d;
      --zone-elq: #6ec6ff;
      --zone-conf: #00913f;
      --zone-playoff: #ffcc00;
      --blue: #0047ab;
      --surface: rgba(255, 255, 255, 0.85);
      --ink: #111111;
      --steel: #333333;
      --line: #000000;
      --line-strong: #000000;
      --green: #00913f;
      --cell-size: clamp(56px, min(6.5vw, 14vh), 100px);
      --hard-shadow: 4px 4px 0 #000;
      --hard-shadow-sm: 2px 2px 0 #000;
      --event-font: "Sora", "Segoe UI", Arial, sans-serif;
      --headline-font: "Anton", "Arial Narrow", Impact, sans-serif;
      --mono-font: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      --led-font: "VT323", "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    ::selection { background: var(--bundesliga-red); color: #fff; }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #f0f0f0;
      color: var(--ink);
      font-family: var(--event-font);
      padding: 22px;
      overflow-x: hidden;
    }

    /* ============================
       HINTERGRUND-CANVAS – ganzer Bildschirm
       ============================ */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .app-shell {
      max-width: 1440px;
      margin: 0 auto;
      position: relative;
      isolation: isolate;
      z-index: 1;
    }

    /* ============================
       KOPF – jetzt hell
       ============================ */
    .liga-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 22px;
      padding: 18px 26px;
      background: var(--surface);
      border: 4px solid #000;
      box-shadow: var(--hard-shadow);
      overflow: hidden;
    }
    .liga-header::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: repeating-linear-gradient(90deg, var(--bundesliga-red) 0 24px, var(--bundesliga-gold) 24px 48px, var(--blue) 48px 72px);
    }
    .liga-header .header-left {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .liga-header h1 {
      font-family: var(--headline-font);
      font-style: italic;
      font-size: clamp(1.7rem, 3.6vw, 2.9rem);
      font-weight: 400;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      margin: 0;
      color: var(--ink);
      -webkit-text-stroke: 1px #fff;
      text-shadow: 3px 3px 0 var(--bundesliga-red), 6px 6px 0 #fff;
      transform: skewX(-2deg);
    }
    .liga-header .sub {
      color: var(--steel);
      font-family: var(--led-font);
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .liga-header .sub strong { color: var(--ink); }

    .header-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .header-nav button {
      padding: 9px 18px;
      border: 3px solid #000;
      background: #fff;
      color: #000;
      font-family: var(--headline-font);
      font-style: italic;
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: var(--hard-shadow-sm);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .header-nav button:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #000; }
    .header-nav button.active {
      background: var(--bundesliga-red);
      color: #fff;
      transform: translate(2px,2px);
      box-shadow: 0 0 0 #000;
    }

    /* ============================
       VIEWS
       ============================ */
    .view { display: none; }
    .view.active { display: block; }

    /* ============================
       HOME-LAYOUT – rechte Spalte 560px
       ============================ */
    .content-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .content-wrapper .left-col {
      flex: 1;
      min-width: 0;
      position: sticky;
      top: 20px;
    }
    .content-wrapper .right-col {
      flex: 0 0 560px;
      min-width: 0;
    }
    @media (max-width: 1100px) {
      .content-wrapper {
        flex-direction: column;
        gap: 22px;
      }
      .content-wrapper .left-col {
        flex: none;
        width: 100%;
        position: static;
        order: 2;
      }
      .content-wrapper .right-col {
        flex: none;
        width: 100%;
        order: 1;
      }
    }

    /* ============================
       TABELLE – heller Hintergrund
       ============================ */
    .table-wrap {
      overflow-x: auto;
      background: var(--surface);
      border: 4px solid #000;
      box-shadow: var(--hard-shadow);
      padding: 4px 0 6px;
      backdrop-filter: blur(2px);
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }
    .table-wrap.centered { max-width: 900px; margin: 0 auto; }
    .liga-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      font-size: 0.75rem;
      min-width: 600px;
      color: var(--ink);
    }
    .liga-table th:nth-child(1) { width: 7%; }
    .liga-table th:nth-child(3) { width: 8%; }
    .liga-table th:nth-child(4), .liga-table th:nth-child(5), .liga-table th:nth-child(6) { width: 7%; }
    .liga-table th:nth-child(7) { width: 15%; }
    .liga-table th:nth-child(8) { width: 10%; }
    .liga-table th:nth-child(9) { width: 10%; }
    .liga-table th {
      text-align: left;
      padding: 10px 10px 8px;
      font-weight: 800;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
      background: var(--blue);
      border-bottom: 3px solid #000;
    }
    .liga-table td {
      padding: 8px;
      border-bottom: 2px solid #000;
      vertical-align: middle;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--ink);
      background: rgba(255,255,255,0.7);
    }
    .liga-table tbody tr { border-left: 5px solid transparent; }
    .liga-table tbody tr:nth-child(even) td { background: rgba(240, 237, 226, 0.6); }
    .liga-table tr:hover td { background: rgba(255, 232, 163, 0.8); }
    .liga-table .pos {
      font-family: var(--led-font);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--ink);
      width: 30px;
      text-align: center;
    }
    .liga-table tbody tr:nth-child(-n+4) {
      border-left: 5px solid var(--zone-cl);
    }
    .liga-table tbody tr:nth-child(-n+4) .pos {
      color: #fff;
      background: var(--zone-cl);
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
    }
    .liga-table tbody tr:nth-child(5) {
      border-left: 5px solid var(--zone-el);
    }
    .liga-table tbody tr:nth-child(5) .pos {
      color: #000;
      background: var(--zone-el);
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
    }
    .liga-table tbody tr:nth-child(6) {
      border-left: 5px solid var(--zone-elq);
    }
    .liga-table tbody tr:nth-child(6) .pos {
      color: #000;
      background: var(--zone-elq);
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
    }
    .liga-table tbody tr:nth-child(7) {
      border-left: 5px solid var(--zone-conf);
    }
    .liga-table tbody tr:nth-child(7) .pos {
      color: #fff;
      background: var(--zone-conf);
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
    }
    .liga-table tbody tr:nth-child(16) {
      border-left: 5px solid var(--zone-playoff);
    }
    .liga-table tbody tr:nth-child(16) .pos {
      color: #000;
      background: var(--zone-playoff);
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
    }
    .liga-table tbody tr:nth-child(17),
    .liga-table tbody tr:nth-child(18) {
      border-left: 5px solid var(--bundesliga-red);
    }
    .liga-table tbody tr:nth-child(17) .pos,
    .liga-table tbody tr:nth-child(18) .pos {
      color: #fff;
      background: var(--bundesliga-red);
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
    }
    .liga-table .team {
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .liga-table .team .team-logo-table {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      object-fit: contain;
      background: transparent;
      border: none;
    }
    .liga-table .team .team-name {
      display: inline;
    }
    .liga-table .pts { font-family: var(--led-font); font-size: 1.3rem; color: var(--ink); text-align: center; }
    .liga-table .num { text-align: center; color: var(--steel); font-weight: 700; }

    /* Mobile Optimierungen für Home-View – bleiben erhalten */
    @media (max-width: 700px) {
      #homeView .liga-table {
        min-width: auto;
        font-size: 0.65rem;
      }
      #homeView .liga-table th:nth-child(3),
      #homeView .liga-table th:nth-child(4),
      #homeView .liga-table th:nth-child(5),
      #homeView .liga-table th:nth-child(6),
      #homeView .liga-table td:nth-child(3),
      #homeView .liga-table td:nth-child(4),
      #homeView .liga-table td:nth-child(5),
      #homeView .liga-table td:nth-child(6) {
        display: none;
      }
      #homeView .liga-table .team .team-name {
        display: none;
      }
      #homeView .liga-table .team .team-logo-table {
        width: 32px;
        height: 32px;
        margin: 0 auto;
      }
      #homeView .liga-table .team {
        justify-content: center;
        gap: 0;
      }
      #homeView .liga-table th:nth-child(1) { width: 12%; }
      #homeView .liga-table th:nth-child(2) { width: 35%; }
      #homeView .liga-table th:nth-child(7) { width: 18%; }
      #homeView .liga-table th:nth-child(8) { width: 15%; }
      #homeView .liga-table th:nth-child(9) { width: 20%; }
      #homeView .table-wrap {
        overflow-x: hidden;
      }
    }

    /* ============================
       SPIELTAG-NAVIGATION
       ============================ */
    .liga-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 22px;
      padding: 10px;
      background: var(--surface);
      border: 4px solid #000;
      box-shadow: var(--hard-shadow);
      backdrop-filter: blur(2px);
    }
    .liga-tabs button {
      flex: 0 1 auto;
      padding: 8px 14px;
      border: 3px solid #000;
      background: #fff;
      color: #000;
      font-family: var(--headline-font);
      font-style: italic;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: var(--hard-shadow-sm);
      transition: transform 0.08s, box-shadow 0.08s;
      white-space: nowrap;
    }
    .liga-tabs button:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #000; }
    .liga-tabs button.active { background: var(--bundesliga-red); color: #fff; transform: translate(2px,2px); box-shadow: 0 0 0 #000; }
    .liga-tabs button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ============================
       SPIELE – helle Karten
       ============================ */
    .spiel-liste { display: flex; flex-direction: column; gap: 14px; }
    .spiel-item {
      background: var(--surface);
      border: 3px solid #000;
      box-shadow: var(--hard-shadow);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    .spiel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      gap: 10px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.3);
    }
    .spiel-header .team-block { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .spiel-header .team-block.heim { justify-content: flex-start; }
    .spiel-header .team-block.auswaerts { justify-content: flex-end; }
    .spiel-header .team-logo-small {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      object-fit: contain;
      background: transparent;
      border: none;
    }
    .spiel-header .team-name {
      font-weight: 800;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: none;
    }
    .spiel-header .score-display {
      font-family: var(--led-font);
      font-size: 1.7rem;
      letter-spacing: 0.06em;
      background: #fff;
      border: 3px solid #000;
      padding: 2px 14px;
      color: var(--ink);
      text-shadow: none;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.1), var(--hard-shadow-sm);
    }

    .spiel-header .toggle-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid #000;
      background: #ffffff;
      color: #000;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: var(--hard-shadow-sm);
      transition: background 0.25s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      position: relative;
    }
    .spiel-header .toggle-btn svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #000;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.25s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: rotate(0deg);
    }
    .spiel-header .toggle-btn:hover {
      transform: scale(1.05);
      box-shadow: 3px 3px 0 #000;
    }
    .spiel-header .toggle-btn.open {
      background: var(--bundesliga-red);
      box-shadow: 0 0 0 #000;
      transform: scale(0.95);
    }
    .spiel-header .toggle-btn.open svg {
      stroke: #ffffff;
      transform: rotate(180deg);
    }
    .spiel-header .toggle-btn.open:hover {
      transform: scale(1.02);
      box-shadow: 2px 2px 0 #000;
    }

    .spiel-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.62rem;
      color: var(--steel);
      font-weight: 700;
      padding: 5px 16px 8px;
      border-bottom: 2px solid #000;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.2);
    }
    .spiel-meta .status { color: var(--zone-cl); font-weight: 800; }
    .spiel-meta .status.done { color: var(--green); }

    .spiel-board-container {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      transition: grid-template-rows 0.32s ease, opacity 0.28s ease;
      background: transparent;
    }
    .spiel-board-container > * { overflow: hidden; }
    .spiel-board-container.open {
      display: grid;
      grid-template-rows: 1fr;
      opacity: 1;
      border-top: 3px solid #000;
      padding: 12px 16px 16px;
    }

    /* ============================
       BRETT – bleibt dunkel, aber passt
       ============================ */
    .board-panel {
      position: relative;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(2px);
      border: 4px solid #000;
      padding: 12px;
      box-shadow: var(--hard-shadow);
    }
    .board-panel .chess-grid {
      display: grid;
      grid-template-columns: repeat(5, var(--cell-size));
      grid-template-rows: repeat(4, var(--cell-size));
      width: calc(var(--cell-size) * 5);
      height: calc(var(--cell-size) * 4);
      margin: 0 auto;
      border: 3px solid #000;
      box-shadow: 0 0 0 3px var(--bundesliga-gold), var(--hard-shadow);
      background: #000;
      overflow: hidden;
    }
    .board-panel .grid-cell { position: relative; border: 1px solid rgba(255,255,255,0.12); padding: 0; overflow: hidden; background: #000; }
    .board-panel .piece-cell {
      display: grid;
      place-items: center;
      background: #141414;
      color: #fff;
      font-weight: 800;
      isolation: isolate;
      position: relative;
    }
    .board-panel .piece-cell.light { background: #202020; }
    .board-panel .piece-cell .field-watermark {
      position: absolute;
      right: 4px;
      bottom: 4px;
      z-index: 4;
      font-family: var(--led-font);
      font-size: clamp(0.8rem, calc(var(--cell-size)*0.2), 1.4rem);
      line-height: 1;
      opacity: 1 !important;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
    }
    .board-panel .piece-cell .field-watermark.positive { color: #2be08a !important; }
    .board-panel .piece-cell .field-watermark.negative { color: #ff4d4d !important; }
    .board-panel .piece-cell .field-watermark.zero { color: #c3aeff !important; }
    .board-panel .piece-cell .field-watermark.neutral { color: rgba(255,255,255,0.18); }
    .board-panel .piece-cell .piece-svg {
      position: relative;
      z-index: 1;
      display: block;
      width: 60%;
      max-width: 50px;
      height: auto;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.35));
      opacity: 0.95;
    }
    .board-panel .piece-cell .player-photo {
      position: absolute;
      inset: 4px;
      z-index: 1;
      width: calc(100% - 8px);
      height: calc(100% - 8px);
      background: rgba(255,255,255,0.08);
      object-fit: contain;
      object-position: center bottom;
      padding: 3px;
      border: 2px solid #fff;
    }
    .board-panel .piece-cell .piece-corner {
      position: absolute;
      top: 4px;
      left: 4px;
      z-index: 2;
      width: 24%;
      max-width: 22px;
      padding: 2px;
      background: #fff;
      border: 2px solid #000;
      filter: none !important;
    }
    .board-panel .piece-cell.has-player-image .piece-svg { display: none; }
    .board-panel .piece-cell.has-player-image .piece-corner { display: block; }

    .board-panel .drop-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }
    .board-panel .drop-cell .drop-value {
      position: absolute;
      top: 4px;
      left: 4px;
      z-index: 5;
      font-family: var(--led-font);
      font-size: clamp(0.9rem, calc(var(--cell-size)*0.22), 1.6rem);
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 3px #000;
      pointer-events: none;
      line-height: 1;
    }
    .board-panel .drop-cell .drop-total {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-family: var(--led-font);
      font-size: clamp(1rem, calc(var(--cell-size)*0.22), 1.6rem);
      color: rgba(255,255,255,0.15);
      pointer-events: none;
      display: none;
    }
    .board-panel .drop-cell.has-theses .drop-total { display: block; }

    .board-panel .placed-list {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0,1fr);
      grid-auto-rows: minmax(0,1fr);
      gap: 2px;
      padding: 2px;
      pointer-events: none;
    }
    .board-panel .placed-chip {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0,1fr);
      place-items: center;
      width: 100%;
      height: 100%;
      border: 1.5px solid #000;
      background: #fff;
      color: #111;
      font-size: clamp(0.25rem, 0.4vw, 0.45rem);
      font-weight: 700;
      line-height: 1.05;
      overflow-wrap: anywhere;
      padding: clamp(3px, calc(var(--cell-size)*0.04), 8px) 4px 4px;
      text-align: center;
      pointer-events: none;
      isolation: isolate;
    }
    .board-panel .placed-chip .chip-watermark {
      position: absolute;
      right: 3px;
      bottom: 2px;
      z-index: 1;
      line-height: 1;
      font-family: var(--led-font);
      font-size: 1.9em;
      opacity: 1 !important;
      pointer-events: none;
    }
    .board-panel .placed-chip .chip-watermark.positive { color: #00913f !important; }
    .board-panel .placed-chip .chip-watermark.negative { color: #c40000 !important; }
    .board-panel .placed-chip .chip-watermark.zero { color: #5c3ba8 !important; }
    .board-panel .placed-chip .chip-watermark.neutral { color: rgba(0,0,0,0.15); }

    /* ============================

    .stats-container {

    .stat-card h3 {

    .stat-section { margin: 12px 16px 8px; }

    .stat-section .section-title {

    .stat-entry {

    .stat-entry:hover { background: rgba(200,200,200,0.5); }
    .stat-entry.top1 { background: rgba(255, 215, 0, 0.25); border-color: var(--bundesliga-gold); }

    .stat-entry .meta-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .stat-entry .meta-col .meta-team {
      font-size: 0.65rem;

    .stat-entry .value-chip { flex-shrink: 0; margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .stat-entry .value-chip .value-num {
      font-family: var(--led-font);

    /* ============================
       ALLE SPIELE VIEW
       ============================ */
    .spieltag-group { margin-bottom: 30px; }
    .spieltag-headline {
      font-family: var(--headline-font);
      font-style: italic;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--surface);
      display: inline-block;
      padding: 6px 14px;
      margin-bottom: 12px;
      border: 3px solid #000;
      box-shadow: var(--hard-shadow-sm);
      backdrop-filter: blur(2px);
    }
    .spieltag-headline small { font-family: var(--led-font); font-size: 0.85rem; color: var(--steel); font-weight: 400; margin-left: 8px; }

    /* ============================
       RESPONSIVE
       ============================ */
    @media (max-width: 700px) {
      .liga-header { padding: 16px 20px; flex-direction: column; align-items: stretch; }
      .liga-header .header-left { flex-direction: column; align-items: stretch; gap: 12px; }
      .header-nav { justify-content: center; }
      .spiel-header { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
      .spiel-header .team-name { font-size: 0.7rem; }
      .spiel-header .score-display { font-size: 1.3rem; padding: 2px 10px; }
      .spiel-header .toggle-btn { width: 34px; height: 34px; }
      .spiel-header .toggle-btn svg { width: 20px; height: 20px; }
      .board-panel .chess-grid { --cell-size: clamp(44px, calc((100vw - 50px)/5), 64px); }
      .spiel-header .team-logo-small { width: 26px; height: 26px; }

      .stat-entry .value-chip .value-num { font-size: 1rem; padding: 1px 8px; }

      .liga-table {

      }
      .liga-table th, .liga-table td {

    }
    @media (max-width: 500px) {
      .spiel-header .team-name { font-size: 0.6rem; }
      .spiel-header .score-display { font-size: 1.1rem; padding: 2px 8px; }

      .spiel-header .toggle-btn svg { width: 18px; height: 18px; }
      .board-panel .chess-grid { --cell-size: clamp(34px, calc((100vw - 30px)/5), 46px); }

      .stat-entry .avatar-wrap { width: 30px; height: 30px; }
      .stat-entry .player-img { width: 30px; height: 30px; }
      .stat-entry .team-badge-mini { width: 12px; height: 12px; right: -2px; bottom: -2px; }
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div class="app-shell" id="app">
    <!-- Kopf -->
    <header class="liga-header">
      <div class="header-left">
        <div>
          <h1>Bundesliga</h1>
          <div class="sub"><strong>Rasenschach</strong> · Saison 26/27</div>
        </div>
        <div class="header-nav" id="headerNav">
          <button class="active" data-view="home">Home</button>
          <button data-view="table">Tabelle</button>
          <button data-view="games">Spiele</button>
          <button data-view="stats">Statistiken</button>
        </div>
      </div>
    </header>

    <!-- VIEW: HOME -->
    <div class="view active" id="homeView">
      <div class="liga-tabs" id="spieltagTabs"></div>
      <div class="content-wrapper">
        <div class="left-col">
          <div class="table-wrap" id="tableWrap">
            <table class="liga-table" id="ligaTable">
              <thead><tr><th>#</th><th>Team</th><th class="num">Sp</th><th class="num">S</th><th class="num">U</th><th class="num">N</th><th class="num">Tore</th><th class="num">Diff</th><th class="pts">Pkt</th></tr></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
        <div class="right-col"><div class="spiel-liste" id="spieleContainer"></div></div>
      </div>
    </div>

    <!-- VIEW: TABELLE -->
    <div class="view" id="tableView">
      <div class="table-wrap">
        <table class="liga-table" id="tableOnly">
          <thead><tr><th>#</th><th>Team</th><th class="num">Sp</th><th class="num">S</th><th class="num">U</th><th class="num">N</th><th class="num">Tore</th><th class="num">Diff</th><th class="pts">Pkt</th></tr></thead>
          <tbody id="tableOnlyBody"></tbody>
        </table>
      </div>
    </div>

    <!-- VIEW: SPIELE (alle) -->
    <div class="view" id="gamesView">
      <div id="allGamesContainer"></div>
    </div>

    <!-- VIEW: STATISTIKEN -->
    <div class="view" id="statsView">
      <div id="statsContainer" class="stats-container"></div>
    </div>
  </div>

  <script>
    // ============================
    //  HINTERGRUND – Pfad auf "grafiken/data/" geändert
    // ============================
    function initBackground() {
      const canvas = document.createElement('canvas');
      canvas.id = 'bgCanvas';
      document.body.prepend(canvas);

      const ctx = canvas.getContext('2d');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      const BG_IMAGE_COUNT = 30;
      const BG_IMAGE_PATH = 'grafiken/data/';  // NEUER PFAD
      const loadPromises = [];

      for (let i = 1; i <= BG_IMAGE_COUNT; i++) {
        const img = new Image();
        img.src = `${BG_IMAGE_PATH}${i}.png`;
        const promise = new Promise((resolve) => {
          img.onload = () => resolve(img);
          img.onerror = () => resolve(null);
        });
        loadPromises.push(promise);
      }

      Promise.all(loadPromises).then(results => {
        const loaded = results.filter(img => img !== null);
        if (loaded.length === 0) {
          console.warn('Keine Hintergrundbilder geladen.');
          return;
        }

        const maxWidth = 120;
        const gap = 12;
        const speedBase = 0.3;
        const speedVariance = 0.15;

        const images = loaded.map(img => {
          const scale = Math.min(1, maxWidth / img.width);
          const w = img.width * scale;
          const h = img.height * scale;
          return { img, w, h };
        });

        const rows = 4;
        const imagesPerRow = Math.ceil(images.length / rows);
        let imgIndex = 0;
        const rowData = [];

        for (let r = 0; r < rows; r++) {
          const rowImages = [];
          for (let c = 0; c < imagesPerRow; c++) {
            if (imgIndex >= images.length) break;
            rowImages.push(images[imgIndex++]);
          }
          if (rowImages.length === 0) continue;

          const baseImages = rowImages;
          let totalWidth = 0;
          baseImages.forEach((img, i) => {
            totalWidth += img.w;
            if (i < baseImages.length - 1) totalWidth += gap;
          });

          const direction = (r % 2 === 0) ? 1 : -1;
          const speed = direction * (speedBase + (Math.random() - 0.5) * speedVariance);

          const positions = [];
          let x = 0;
          for (let i = 0; i < baseImages.length; i++) {
            positions.push(x);
            x += baseImages[i].w + gap;
          }

          const y = (r / (rows - 1)) * (canvas.height - baseImages[0].h);
          rowData.push({
            images: baseImages,
            y: Math.min(y, canvas.height - baseImages[0].h),
            speed: speed,
            positions: positions,
            totalWidth: totalWidth,
            offset: 0,
          });
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (const row of rowData) {
            row.offset += row.speed;
            row.offset = ((row.offset % row.totalWidth) + row.totalWidth) % row.totalWidth;

            const { images, y, positions, totalWidth, offset } = row;
            for (let i = 0; i < images.length; i++) {
              const img = images[i];
              const baseX = positions[i];
              for (let copy = -1; copy <= 1; copy++) {
                let x = baseX + offset + copy * totalWidth;
                if (x + img.w > -50 && x < canvas.width + 50) {
                  ctx.save();
                  ctx.globalAlpha = 0.8; // höhere Deckkraft
                  ctx.drawImage(img.img, x, y, img.w, img.h);
                  ctx.restore();
                }
              }
            }
          }
          requestAnimationFrame(animate);
        }
        animate();
      });
    }

    // ============================
    //  KONFIGURATION
    // ============================
    const SPIELPLAN_URL = 'spielplan.json';
    const DATA_BASE = 'data/';

    let spielplan = null;
    let teams = [];
    let allGameData = {};
    let currentView = 'home';
    let currentSpieltag = 0;

    // ============================
    //  PIECES
    // ============================
    const PIECES = [
      { id: 'rook',   name: 'Turm', label: 'T' },
      { id: 'bishop', name: 'Läufer', label: 'L' },
      { id: 'knight', name: 'Springer', label: 'S' },
      { id: 'queen',  name: 'Dame', label: 'D' },
      { id: 'king',   name: 'König', label: 'K' },
    ];
    const PIECE_SVG_URLS = {
      rook:   'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
      bishop: 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
      knight: 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
      queen:  'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
      king:   'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
    };

    // ============================
    //  HILFSFUNKTION für Team-Logos
    // ============================
    function getTeamLogo(teamName) {
      const idx = teams.indexOf(teamName);
      if (idx === -1) return null;
      return `data/logos/${idx + 1}.png`;
    }

    function formatNumber(num) { return num > 0 ? `+${num}` : String(num); }
    function getScoreTone(value) {
      if (value > 0) return 'positive';
      if (value < 0) return 'negative';
      return 'zero';
    }
    function getPieceById(id) { return PIECES.find(p => p.id === id); }

    // ============================
    //  getAssignmentScore
    // ============================
    function getAssignmentScore(assignment, state) {
      if (!assignment.side || !assignment.piece || !assignment.polarity) return 0;
      const piece = getPieceById(assignment.piece);
      if (!piece) return 0;
      const sign = assignment.polarity === 'positive' ? 1 : -1;
      const base = { rook:3, bishop:1, knight:1, queen:1, king:3 }[assignment.piece] || 1;
      switch (assignment.piece) {
        case 'knight':
          const knightVal = state.questionValue ?? 1;
          return (assignment.polarity === 'positive') ? knightVal : 0;
        case 'bishop':
          return (assignment.polarity === 'positive') ? -base : 0;
        case 'queen':
          return (assignment.polarity === 'positive') ? base : 0;
        case 'rook':
          return base * sign * -1;
        default:
          return base * sign;
      }
    }

    function isGameComplete(state) {
      const placed = state.assignments.filter(a => a.side && a.piece).length;
      return placed >= 10;
    }

    function getGameScore(state) {
      let whiteTotal = 0, blackTotal = 0;
      PIECES.forEach(p => {
        whiteTotal += state.results.white[p.id] || 0;
        blackTotal += state.results.black[p.id] || 0;
      });
      state.assignments.forEach(a => {
        if (a.side === 'white') whiteTotal += getAssignmentScore(a, state);
        else if (a.side === 'black') blackTotal += getAssignmentScore(a, state);
      });
      return { white: whiteTotal, black: blackTotal };
    }

    // ============================
    //  TABELLE
    // ============================
    function buildTableData() {
      if (!spielplan || !teams.length) return [];
      const stats = {};
      teams.forEach(t => {
        stats[t] = { sp: 0, s: 0, u: 0, n: 0, tore: 0, gegentore: 0, punkte: 0 };
      });
      spielplan.spieltage.forEach((spieltag, stIdx) => {
        spieltag.forEach((spiel, spIdx) => {
          const key = `${stIdx}-${spIdx}`;
          const state = allGameData[key];
          if (!state) return;
          if (!isGameComplete(state)) return;
          const score = getGameScore(state);
          const home = spiel.heim, away = spiel.auswaerts;
          if (!home || !away) return;
          stats[home].sp++; stats[away].sp++;
          stats[home].tore += score.white; stats[home].gegentore += score.black;
          stats[away].tore += score.black; stats[away].gegentore += score.white;
          if (score.white > score.black) { stats[home].s++; stats[home].punkte += 3; stats[away].n++; }
          else if (score.black > score.white) { stats[away].s++; stats[away].punkte += 3; stats[home].n++; }
          else { stats[home].u++; stats[home].punkte += 1; stats[away].u++; stats[away].punkte += 1; }
        });
      });
      const sorted = teams.slice().sort((a, b) => {
        if (stats[b].punkte !== stats[a].punkte) return stats[b].punkte - stats[a].punkte;
        const diffA = stats[a].tore - stats[a].gegentore;
        const diffB = stats[b].tore - stats[b].gegentore;
        if (diffB !== diffA) return diffB - diffA;
        return stats[b].tore - stats[a].tore;
      });
      return sorted.map((team, idx) => ({
        pos: idx + 1,
        team,
        sp: stats[team].sp,
        s: stats[team].s,
        u: stats[team].u,
        n: stats[team].n,
        tore: stats[team].tore,
        gegentore: stats[team].gegentore,
        diff: stats[team].tore - stats[team].gegentore,
        punkte: stats[team].punkte
      }));
    }

    function renderTables() {
      const data = buildTableData();
      const tbody1 = document.getElementById('tableBody');
      const tbody2 = document.getElementById('tableOnlyBody');
      tbody1.innerHTML = ''; tbody2.innerHTML = '';
      data.forEach(row => {
        const diff = row.diff;
        const logo = getTeamLogo(row.team);
        const logoHtml = logo ? `<img class="team-logo-table" src="${logo}" alt="" />` : '';

        // Team-Spalte: Logo + Teamname (für mobile wird der Name ausgeblendet)
        const teamHtml = `<span class="team">${logoHtml}<span class="team-name">${row.team}</span></span>`;

        const tr1 = document.createElement('tr');
        tr1.innerHTML = `<td class="pos">${row.pos}</td><td>${teamHtml}</td><td class="num">${row.sp}</td><td class="num">${row.s}</td><td class="num">${row.u}</td><td class="num">${row.n}</td><td class="num">${row.tore}:${row.gegentore}</td><td class="num">${diff>0?'+':''}${diff}</td><td class="pts">${row.punkte}</td>`;
        tbody1.appendChild(tr1);

        const tr2 = document.createElement('tr');
        tr2.innerHTML = `<td class="pos">${row.pos}</td><td>${teamHtml}</td><td class="num">${row.sp}</td><td class="num">${row.s}</td><td class="num">${row.u}</td><td class="num">${row.n}</td><td class="num">${row.tore}:${row.gegentore}</td><td class="num">${diff>0?'+':''}${diff}</td><td class="pts">${row.punkte}</td>`;
        tbody2.appendChild(tr2);
      });
    }

    // ============================
    //  BRETT-RENDERER
    // ============================
    function renderBoard(container, stIdx, spIdx, homeTeam, awayTeam, state) {
      const board = document.createElement('div');
      board.className = 'board-panel';

      const grid = document.createElement('div');
      grid.className = 'chess-grid';
      const rows = ['top','white','black','bottom'];
      rows.forEach(row => {
        PIECES.forEach((piece, idx) => {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          if (row === 'top' || row === 'bottom') {
            cell.classList.add('piece-cell');
            if ((row === 'top' && idx%2===1) || (row === 'bottom' && idx%2===0)) cell.classList.add('light');
            const side = row === 'top' ? 'white' : 'black';
            const slot = `${row}-${piece.id}`;
            const image = state.figureImages?.[slot] || null;
            const scoreVal = state.results[side]?.[piece.id] ?? 0;
            const pieceSvg = PIECE_SVG_URLS[piece.id];
            let html = `<strong class="field-watermark ${getScoreTone(scoreVal)}">${formatNumber(scoreVal)}</strong>`;
            if (image) {
              cell.classList.add('has-player-image');
              html += `<img class="player-photo" src="${image}" alt="" />`;
              html += `<img class="piece-corner" src="${pieceSvg}" alt="" />`;
            } else {
              html += `<img class="piece-svg" src="${pieceSvg}" alt="" />`;
            }
            cell.innerHTML = html;
          } else {
            cell.classList.add('drop-cell');
            cell.dataset.side = row;
            cell.dataset.piece = piece.id;
            let thesisTotal = 0;
            state.assignments.forEach(a => {
              if (a.side === row && a.piece === piece.id) thesisTotal += getAssignmentScore(a, state);
            });
            let figureValue;
            if (piece.id === 'knight') {
              figureValue = (state.questionValue !== undefined && state.questionValue !== null)
                ? formatNumber(state.questionValue)
                : '?';
            } else if (piece.id === 'rook') {
              figureValue = '±3';
            } else if (piece.id === 'bishop') {
              figureValue = '-1';
            } else if (piece.id === 'queen') {
              figureValue = '+1';
            } else if (piece.id === 'king') {
              figureValue = '±3';
            } else {
              figureValue = piece.label;
            }
            let html = `<div class="drop-value">${figureValue}</div>`;
            if (thesisTotal !== 0) { html += `<div class="drop-total">${formatNumber(thesisTotal)}</div>`; cell.classList.add('has-theses'); }
            html += `<div class="placed-list" data-slot="${row}-${piece.id}"></div>`;
            cell.innerHTML = html;
          }
          grid.appendChild(cell);
        });
      });
      board.appendChild(grid);
      container.innerHTML = '';
      container.appendChild(board);

      container.querySelectorAll('.placed-list').forEach(slot => slot.innerHTML = '');
      state.assignments.forEach(a => {
        if (!a.side || !a.piece) return;
        const slot = container.querySelector(`[data-slot="${a.side}-${a.piece}"]`);
        if (!slot) return;
        const score = getAssignmentScore(a, state);
        const chip = document.createElement('span');
        chip.className = 'placed-chip';
        chip.innerHTML = `<strong class="chip-watermark ${getScoreTone(score)}">${formatNumber(score)}</strong><span class="fit-text">${state.theses[a.id-1]}</span>`;
        slot.appendChild(chip);
      });
    }

    // ============================
    //  SPIEL-LISTE
    // ============================
    function createSpielItem(stIdx, spIdx, spiel, state) {
      const item = document.createElement('div');
      item.className = 'spiel-item';

      const homeLogo = getTeamLogo(spiel.heim);
      const awayLogo = getTeamLogo(spiel.auswaerts);

      const header = document.createElement('div');
      header.className = 'spiel-header';

      const chevronSVG = `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;

      let scoreText = '- : -';
      let statusText = 'keine Daten';
      let statusClass = '';
      let toggleBtn = '';

      if (state) {
        const score = getGameScore(state);
        const placed = state.assignments.filter(a => a.side && a.piece).length;
        const complete = placed >= 10;
        scoreText = `${score.white} : ${score.black}`;
        statusText = complete ? 'gespielt' : 'offen';
        statusClass = complete ? 'done' : '';
        toggleBtn = `<button class="toggle-btn" aria-label="Brett ein-/ausklappen">${chevronSVG}</button>`;
      }

      header.innerHTML = `
        <div class="team-block heim">${homeLogo ? `<img class="team-logo-small" src="${homeLogo}" alt="" />` : ''}<span class="team-name">${spiel.heim}</span></div>
        <span class="score-display">${scoreText}</span>
        <div class="team-block auswaerts"><span class="team-name">${spiel.auswaerts}</span>${awayLogo ? `<img class="team-logo-small" src="${awayLogo}" alt="" />` : ''}</div>
        ${toggleBtn}
      `;
      item.appendChild(header);

      const meta = document.createElement('div');
      meta.className = 'spiel-meta';
      meta.innerHTML = `<span class="status ${statusClass}">${statusText}</span>`;
      item.appendChild(meta);

      if (state) {
        const boardContainer = document.createElement('div');
        boardContainer.className = 'spiel-board-container';
        item.appendChild(boardContainer);
        const toggleBtnEl = header.querySelector('.toggle-btn');
        let isOpen = false;
        toggleBtnEl.addEventListener('click', (e) => {
          e.stopPropagation();
          isOpen = !isOpen;
          toggleBtnEl.classList.toggle('open', isOpen);
          boardContainer.classList.toggle('open', isOpen);
          if (isOpen && !boardContainer.hasChildNodes()) {
            renderBoard(boardContainer, stIdx, spIdx, spiel.heim, spiel.auswaerts, state);
          }
        });
      }

      return item;
    }

    // ============================
    //  HOME
    // ============================
    function renderHome(spieltagIndex) {
      currentSpieltag = spieltagIndex;
      const container = document.getElementById('spieleContainer');
      container.innerHTML = '';
      const spiele = spielplan.spieltage[spieltagIndex];
      if (!spiele) { container.innerHTML = '<p style="color:var(--steel);">Spieltag nicht gefunden.</p>'; return; }
      spiele.forEach((spiel, idx) => {
        const key = `${spieltagIndex}-${idx}`;
        const state = allGameData[key];
        const item = createSpielItem(spieltagIndex, idx, spiel, state);
        container.appendChild(item);
      });
      renderTabs(spieltagIndex + 1);
    }

    function computeTabNumbers(total, current) {
      if (total <= 5) return Array.from({ length: total }, (_, i) => i + 1);
      const raw = [1, current-1, current, current+1, total];
      const seen = new Set();
      const result = [];
      raw.forEach(n => { if (n>=1 && n<=total && !seen.has(n)) { seen.add(n); result.push(n); } });
      result.sort((a,b) => a-b);
      return result;
    }

    function renderTabs(current) {
      const total = spielplan.spieltage.length;
      const tabsContainer = document.getElementById('spieltagTabs');
      tabsContainer.innerHTML = '';
      computeTabNumbers(total, current).forEach(n => {
        const btn = document.createElement('button');
        btn.textContent = `${n}. Spieltag`;
        btn.dataset.index = n - 1;
        btn.classList.toggle('active', n === current);
        btn.addEventListener('click', () => renderHome(n - 1));
        tabsContainer.appendChild(btn);
      });
    }

    // ============================
    //  ALLE SPIELE
    // ============================
    function renderAllGames() {
      const container = document.getElementById('allGamesContainer');
      container.innerHTML = '';
      spielplan.spieltage.forEach((spiele, stIdx) => {
        const group = document.createElement('div');
        group.className = 'spieltag-group';
        const headline = document.createElement('div');
        headline.className = 'spieltag-headline';
        headline.innerHTML = `Spieltag ${stIdx+1} <small>${spiele.length} Partien</small>`;
        group.appendChild(headline);
        const list = document.createElement('div');
        list.className = 'spiel-liste';
        spiele.forEach((spiel, spIdx) => {
          const key = `${stIdx}-${spIdx}`;
          const state = allGameData[key];
          const item = createSpielItem(stIdx, spIdx, spiel, state);
          list.appendChild(item);
        });
        group.appendChild(list);
        container.appendChild(group);
      });
    }

    // ============================
    //  STATISTIKEN
    // ============================
    function computeAppearanceStats() {
      const players = {};
      for (const [key, state] of Object.entries(allGameData)) {
        if (!state) continue;
        if (!isGameComplete(state)) continue;
        const [stIdx, spIdx] = key.split('-').map(Number);
        const spiel = spielplan.spieltage[stIdx]?.[spIdx];
        if (!spiel) continue;

        const rows = ['top', 'bottom'];
        rows.forEach(row => {
          const side = row === 'top' ? 'white' : 'black';
          PIECES.forEach(piece => {
            const slot = `${row}-${piece.id}`;
            const image = state.figureImages?.[slot];
            if (!image) return;
            if (!players[image]) {
              players[image] = { count: 0 };
            }
            players[image].count += 1;
          });
        });
      }
      const sorted = Object.entries(players)
        .map(([image, data]) => ({ image, count: data.count }))
        .sort((a, b) => b.count - a.count)
        .slice(0, 10);
      return sorted;
    }

    function computePlayerStats() {
      const pieceStats = {};
      PIECES.forEach(p => {
        pieceStats[p.id] = { players: {} };
      });

      for (const [key, state] of Object.entries(allGameData)) {
        if (!state) continue;
        if (!isGameComplete(state)) continue;
        
        const [stIdx, spIdx] = key.split('-').map(Number);
        const spiel = spielplan.spieltage[stIdx]?.[spIdx];
        if (!spiel) continue;

        const rows = ['top', 'bottom'];
        rows.forEach(row => {
          const side = row === 'top' ? 'white' : 'black';
          PIECES.forEach(piece => {
            const slot = `${row}-${piece.id}`;
            const image = state.figureImages?.[slot];
            if (!image) return;
            const points = state.results[side]?.[piece.id] ?? 0;
            const teamLogo = side === 'white' ? getTeamLogo(spiel.heim) : getTeamLogo(spiel.auswaerts);
            const teamName = side === 'white' ? spiel.heim : spiel.auswaerts;

            const playerData = pieceStats[piece.id].players;
            if (!playerData[image]) {
              playerData[image] = {
                games: 0,
                totalPoints: 0,
                maxPoints: -Infinity,
                maxGameTeam: null,
                maxGameTeamLogo: null,
                values: []
              };
            }
            const p = playerData[image];
            p.games += 1;
            p.totalPoints += points;
            p.values.push(points);
            if (points > p.maxPoints) {
              p.maxPoints = points;
              p.maxGameTeam = teamName;
              p.maxGameTeamLogo = teamLogo;
            }
          });
        });
      }

      const result = {};
      for (const [piece, data] of Object.entries(pieceStats)) {
        const players = data.players;
        const entries = Object.entries(players).map(([image, stats]) => ({
          image,
          games: stats.games,
          totalPoints: stats.totalPoints,
          maxPoints: stats.maxPoints,
          avg: stats.games > 0 ? stats.totalPoints / stats.games : 0,
          team: stats.maxGameTeam,
          teamLogo: stats.maxGameTeamLogo,
          values: stats.values || []
        }));

        const bySingle = [...entries]
          .sort((a, b) => b.maxPoints - a.maxPoints)
          .slice(0, 5);
        
        const byAvg = [...entries]
          .filter(e => e.games >= 3)
          .sort((a, b) => b.avg - a.avg)
          .slice(0, 5);
        
        result[piece] = { bySingle, byAvg };
      }
      return result;
    }

    function renderStatistics() {
      const container = document.getElementById('statsContainer');
      container.innerHTML = '';

      const appearanceData = computeAppearanceStats();
      const appearanceCard = document.createElement('div');
      appearanceCard.className = 'stat-card';
      const headApp = document.createElement('div');
      headApp.className = 'stat-card-head';
      headApp.innerHTML = `
        <div class="piece-icon-wrap" style="background:rgba(255,215,0,0.12);border-color:rgba(255,215,0,0.3);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--bundesliga-gold);width:20px;height:20px;"><path d="M4 20V12"/><path d="M12 20V6"/><path d="M20 20V15"/></svg>
        </div>
        <h3>Häufigste Einsätze</h3>
      `;
      appearanceCard.appendChild(headApp);

      const sectionApp = document.createElement('div');
      sectionApp.className = 'stat-section';
      const listApp = document.createElement('div');
      if (appearanceData.length === 0) {
        listApp.innerHTML = '<div class="no-data">Keine Daten verfügbar</div>';
      } else {
        appearanceData.forEach((entry, idx) => {
          const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
          const div = document.createElement('div');
          div.className = `stat-entry ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}`;
          div.innerHTML = `
            <div class="rank-badge ${rankClass}">${idx + 1}</div>
            <div class="avatar-wrap">
              <img class="player-img" src="${entry.image}" alt="Spieler" onerror="this.style.display='none'" />
            </div>
            <div class="value-chip" style="margin-left:0;flex:1;align-items:flex-start;">
              <span class="value-num">${entry.count}</span>
              <span class="value-unit">Einsätze</span>
            </div>
          `;
          listApp.appendChild(div);
        });
      }
      sectionApp.appendChild(listApp);
      appearanceCard.appendChild(sectionApp);
      container.appendChild(appearanceCard);

      const stats = computePlayerStats();

      PIECES.forEach(p => {
        const card = document.createElement('div');
        card.className = 'stat-card';

        const head = document.createElement('div');
        head.className = 'stat-card-head';
        head.innerHTML = `
          <div class="piece-icon-wrap"><img src="${PIECE_SVG_URLS[p.id]}" alt="" /></div>
          <h3>${p.name}</h3>
        `;
        card.appendChild(head);

        const sectionSingle = document.createElement('div');
        sectionSingle.className = 'stat-section';
        sectionSingle.innerHTML = `<div class="section-title">Höchste Einzelpunktzahl</div>`;
        const listSingle = document.createElement('div');
        
        const singleData = stats[p.id]?.bySingle || [];
        if (singleData.length === 0) {
          listSingle.innerHTML = '<div class="no-data">Keine Daten verfügbar</div>';
        } else {
          singleData.forEach((entry, idx) => {
            const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
            const div = document.createElement('div');
            div.className = `stat-entry ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}`;
            div.innerHTML = `
              <div class="rank-badge ${rankClass}">${idx + 1}</div>
              <div class="avatar-wrap">
                <img class="player-img" src="${entry.image}" alt="Spieler" onerror="this.style.display='none'" />
                ${entry.teamLogo ? `<img class="team-badge-mini" src="${entry.teamLogo}" alt="" />` : ''}
              </div>
              <div class="meta-col">
                <span class="meta-team">${entry.team || '?'}</span>
                <span class="meta-detail">${entry.games} Einsätze · gesamt ${entry.totalPoints}</span>
              </div>
              <div class="value-chip">
                <span class="value-num">${entry.maxPoints}</span>
                <span class="value-unit">Punkte</span>
              </div>
            `;
            listSingle.appendChild(div);
          });
        }
        sectionSingle.appendChild(listSingle);
        card.appendChild(sectionSingle);

        const sectionAvg = document.createElement('div');
        sectionAvg.className = 'stat-section';
        sectionAvg.innerHTML = `<div class="section-title">Bester Durchschnitt (min. 3 Spiele)</div>`;
        const listAvg = document.createElement('div');
        
        const avgData = stats[p.id]?.byAvg || [];
        if (avgData.length === 0) {
          listAvg.innerHTML = '<div class="no-data">Nicht genug Einsätze (mindestens 3)</div>';
        } else {
          avgData.forEach((entry, idx) => {
            const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
            const div = document.createElement('div');
            div.className = `stat-entry ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}`;
            div.innerHTML = `
              <div class="rank-badge ${rankClass}">${idx + 1}</div>
              <div class="avatar-wrap">
                <img class="player-img" src="${entry.image}" alt="Spieler" onerror="this.style.display='none'" />
              </div>
              <div class="meta-col">
                <span class="meta-detail">${entry.games} Spiele · gesamt ${entry.totalPoints}</span>
              </div>
              <div class="value-chip">
                <span class="value-num">${entry.avg.toFixed(1)}</span>
                <span class="value-unit">Ø Punkte</span>
              </div>
            `;
            listAvg.appendChild(div);
          });
        }
        sectionAvg.appendChild(listAvg);
        card.appendChild(sectionAvg);

        container.appendChild(card);
      });
    }

    // ============================
    //  VIEW-NAVIGATION
    // ============================
    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.header-nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === view);
      });
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById(`${view}View`).classList.add('active');
      if (view === 'games') renderAllGames();
      if (view === 'stats') renderStatistics();
    }

    // ============================
    //  LADE ALLE DATEN
    // ============================
    async function loadAllGameData() {
      const gameData = {};
      const totalSpieltage = spielplan.spieltage.length;
      const stPromises = [];
      for (let stIdx = 0; stIdx < totalSpieltage; stIdx++) {
        const spiele = spielplan.spieltage[stIdx];
        const spieleCount = spiele.length;
        const spielPromises = [];
        for (let spIdx = 0; spIdx < spieleCount; spIdx++) {
          const filePath = `${DATA_BASE}Spieltag ${stIdx+1}/${spIdx+1}.json`;
          spielPromises.push(
            fetch(filePath)
              .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
              .then(data => ({ stIdx, spIdx, data }))
              .catch(() => null)
          );
        }
        stPromises.push(
          Promise.all(spielPromises).then(results => {
            const valid = results.filter(r => r !== null);
            for (const { stIdx, spIdx, data } of valid) {
              const state = data.data || data;
              if (!state) return;
              if (state.positions) {
                state.assignments = state.positions.map(p => ({
                  id: p.id,
                  side: p.side || null,
                  piece: p.piece || null,
                  polarity: p.polarity || null,
                  knightSwing: p.knightSwing ?? 1,
                }));
                delete state.positions;
              }
              if (!state.results) {
                state.results = { white: { rook:0, bishop:0, knight:0, queen:0, king:0 }, black: { rook:0, bishop:0, knight:0, queen:0, king:0 } };
              }
              if (!state.theses) state.theses = Array.from({ length: 12 }, (_, i) => `These ${i+1}`);
              if (!state.teamLogos) state.teamLogos = { white: null, black: null };
              if (!state.figureImages) state.figureImages = {};
              gameData[`${stIdx}-${spIdx}`] = state;
            }
          })
        );
      }
      await Promise.all(stPromises);
      return gameData;
    }

    // ============================
    //  INIT
    // ============================
    async function init() {
      initBackground();

      try {
        const res = await fetch(SPIELPLAN_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        spielplan = await res.json();
        teams = spielplan.teams;

        allGameData = await loadAllGameData();
        renderTables();

        let startIndex = 0;
        for (let i = spielplan.spieltage.length - 1; i >= 0; i--) {
          const spiele = spielplan.spieltage[i];
          const hasData = spiele.some((_, spIdx) => allGameData[`${i}-${spIdx}`]);
          if (hasData) { startIndex = i; break; }
        }
        if (spielplan.spieltage.length > 0) renderHome(startIndex);

        document.querySelectorAll('.header-nav button').forEach(btn => {
          btn.addEventListener('click', () => switchView(btn.dataset.view));
        });
      } catch (err) {
        console.error('Fehler beim Laden:', err);
        document.getElementById('spieleContainer').innerHTML = '<p style="color:var(--bundesliga-red);">Spielplan konnte nicht geladen werden.</p>';
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
