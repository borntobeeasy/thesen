<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Thesen‑Voting (Firebase)</title>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700;800&family=VT323&display=swap" rel="stylesheet" />
    <style>
        /* ============================
           TOKENS – Retro 90er Bundesliga Style
           (identisch zur Tabellen-Seite)
           ============================ */
        :root {
            color-scheme: dark;
            --night: #0a0a0a;
            --night-2: #161616;
            --bundesliga-red: #e2001a;
            --bundesliga-red-dark: #9e0008;
            --bundesliga-gold: #ffcc00;
            --silver: #c8ced6;
            --bronze: #cd7f32;
            --blue: #0047ab;
            --green: #00913f;
            --ink: #111111;
            --steel: #555555;
            --line: #000000;
            --hard-shadow: 4px 4px 0 #000;
            --hard-shadow-sm: 2px 2px 0 #000;
            --event-font: "Sora", "Segoe UI", Arial, sans-serif;
            --headline-font: "Anton", "Arial Narrow", Impact, sans-serif;
            --mono-font: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
            --led-font: "VT323", "Courier New", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--event-font);
            background-color: var(--night);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px 16px;
        }

        #app {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border: 4px solid var(--line);
            border-radius: 0;
            box-shadow: var(--hard-shadow);
            padding: 26px 20px 32px;
            position: relative;
            min-height: 80vh;
            overflow: hidden;
        }

        #app::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 8px;
            background: repeating-linear-gradient(90deg, var(--bundesliga-red) 0 24px, var(--bundesliga-gold) 24px 48px, var(--blue) 48px 72px);
        }

        h1 {
            font-family: var(--headline-font);
            font-style: italic;
            font-weight: 400;
            font-size: clamp(1.3rem, 6vw, 1.7rem);
            text-transform: uppercase;
            letter-spacing: 0.01em;
            color: var(--ink);
            margin-bottom: 10px;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            transform: skewX(-2deg);
        }

        .phase-badge {
            font-family: var(--led-font);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: var(--bundesliga-red);
            color: #fff;
            border: 3px solid #000;
            box-shadow: var(--hard-shadow-sm);
            padding: 4px 14px;
            border-radius: 0;
            white-space: nowrap;
        }

        hr {
            border: none;
            border-top: 3px solid #000;
            margin: 16px 0 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 3px solid #000;
            border-radius: 0;
            font-size: 16px;
            font-family: var(--event-font);
            outline: none;
            background: #fff;
            transition: box-shadow 0.15s, transform 0.15s;
        }

        .input-group input:focus {
            box-shadow: var(--hard-shadow-sm);
        }

        .input-group button {
            padding: 12px 20px;
            background: #fff;
            color: #000;
            border: 3px solid #000;
            border-radius: 0;
            font-family: var(--headline-font);
            font-style: italic;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: var(--hard-shadow-sm);
            transition: transform 0.08s, box-shadow 0.08s, background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .input-group button:hover {
            background: var(--bundesliga-red);
            color: #fff;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #000;
        }

        .theses-list {
            list-style: none;
            margin-top: 8px;
        }

        .theses-list li {
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 14px;
            border: 2px solid #000;
            border-radius: 0;
            box-shadow: var(--hard-shadow-sm);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
            gap: 10px;
        }

        .theses-list li .delete-btn {
            background: none;
            border: 2px solid transparent;
            color: var(--steel);
            font-family: var(--headline-font);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 8px;
            transition: color 0.15s, border-color 0.15s;
        }

        .theses-list li .delete-btn:hover {
            color: #fff;
            background: var(--bundesliga-red);
            border-color: #000;
        }

        .theses-list li .delete-btn.disabled {
            color: #c9c9c9;
            cursor: not-allowed;
            pointer-events: none;
        }

        .empty-msg {
            color: var(--steel);
            text-align: center;
            padding: 30px 0;
            font-family: var(--led-font);
            font-size: 1.1rem;
            letter-spacing: 0.04em;
        }

        .card-area {
            position: relative;
            height: 380px;
            margin: 16px 0 20px;
            touch-action: none;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #000;
            border-radius: 0;
            box-shadow: var(--hard-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            text-align: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: default;
            will-change: transform;
            user-select: none;
            line-height: 1.5;
        }

        .card.swiped-left {
            transform: translateX(-120%) rotate(-12deg);
            opacity: 0;
        }

        .card.swiped-right {
            transform: translateX(120%) rotate(12deg);
            opacity: 0;
        }

        .card .card-text {
            pointer-events: none;
        }

        .card-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
        }

        .card-actions.hidden {
            display: none;
        }

        .card-actions button {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid #000;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.15s;
            box-shadow: var(--hard-shadow-sm);
            background: #fff;
        }

        .card-actions button:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 #000;
        }

        .btn-dislike {
            color: var(--bundesliga-red);
        }

        .btn-dislike:hover {
            background: var(--bundesliga-red);
            color: #fff;
        }

        .btn-like {
            color: var(--green);
        }

        .btn-like:hover {
            background: var(--green);
            color: #fff;
        }

        .vote-counter {
            text-align: center;
            margin-top: 8px;
            font-family: var(--led-font);
            letter-spacing: 0.04em;
            color: var(--steel);
            font-size: 1rem;
        }

        .vote-counter span {
            font-weight: 700;
            color: var(--ink);
            font-family: var(--mono-font);
        }

        .ranking {
            list-style: none;
            margin-top: 8px;
        }

        .ranking li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #000;
            border-radius: 0;
            box-shadow: var(--hard-shadow-sm);
            margin-bottom: 10px;
        }

        .ranking .rank {
            font-family: var(--headline-font);
            font-style: italic;
            font-weight: 400;
            font-size: 20px;
            color: var(--ink);
            min-width: 34px;
            text-align: center;
        }

        .ranking .rank.gold {
            color: var(--night);
            background: var(--bundesliga-gold);
            border: 2px solid #000;
            box-shadow: var(--hard-shadow-sm);
            padding: 2px 0;
        }

        .ranking .rank.silver {
            color: var(--night);
            background: var(--silver);
            border: 2px solid #000;
            box-shadow: var(--hard-shadow-sm);
            padding: 2px 0;
        }

        .ranking .rank.bronze {
            color: #fff;
            background: var(--bronze);
            border: 2px solid #000;
            box-shadow: var(--hard-shadow-sm);
            padding: 2px 0;
        }

        .ranking .text {
            flex: 1;
            word-break: break-word;
            font-weight: 600;
        }

        .ranking .votes {
            font-family: var(--mono-font);
            font-weight: 700;
            color: #fff;
            background: var(--night);
            border: 2px solid #000;
            padding: 2px 12px;
            border-radius: 0;
            font-size: 14px;
        }

        .export-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 26px;
            background: var(--green);
            color: #fff;
            border: 3px solid #000;
            border-radius: 0;
            font-family: var(--headline-font);
            font-style: italic;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: var(--hard-shadow-sm);
            transition: transform 0.08s, box-shadow 0.08s;
        }

        .export-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #000;
        }

        .admin-area {
            margin-top: 28px;
            border-top: 3px dashed #000;
            padding-top: 20px;
        }

        .admin-toggle {
            background: #fff;
            border: 2px solid #000;
            color: var(--ink);
            font-family: var(--mono-font);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 0;
            box-shadow: var(--hard-shadow-sm);
            transition: transform 0.08s, box-shadow 0.08s;
        }

        .admin-toggle:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #000;
        }

        .admin-panel {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #000;
            box-shadow: var(--hard-shadow-sm);
            padding: 16px;
            border-radius: 0;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .admin-panel.open {
            display: flex;
        }

        .admin-panel label {
            font-family: var(--mono-font);
            font-weight: 700;
            font-size: 13px;
            color: var(--ink);
        }

        .admin-panel select {
            padding: 8px 14px;
            border-radius: 0;
            border: 2px solid #000;
            background: white;
            font-family: var(--event-font);
            font-size: 14px;
            flex: 1;
            min-width: 120px;
        }

        .admin-panel button {
            padding: 8px 16px;
            background: var(--blue);
            color: white;
            border: 2px solid #000;
            border-radius: 0;
            font-family: var(--headline-font);
            font-style: italic;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--hard-shadow-sm);
            transition: transform 0.08s, box-shadow 0.08s;
        }

        .admin-panel button:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #000;
        }

        .admin-panel .reset-btn {
            background: var(--bundesliga-red);
        }

        .footer {
            margin-top: 18px;
            font-family: var(--led-font);
            font-size: 13px;
            letter-spacing: 0.04em;
            color: var(--steel);
            text-align: center;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #fff;
            padding: 30px 26px;
            border: 4px solid #000;
            border-radius: 0;
            max-width: 340px;
            width: 90%;
            box-shadow: var(--hard-shadow);
            text-align: center;
        }

        .modal-box h2 {
            font-family: var(--headline-font);
            font-style: italic;
            font-weight: 400;
            font-size: 22px;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border: 3px solid #000;
            border-radius: 0;
            font-size: 16px;
            margin: 12px 0 16px;
            outline: none;
        }

        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-box .modal-actions button {
            padding: 10px 22px;
            border: 3px solid #000;
            border-radius: 0;
            font-family: var(--headline-font);
            font-style: italic;
            font-size: 15px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--hard-shadow-sm);
            transition: transform 0.08s, box-shadow 0.08s;
        }

        .modal-box .modal-actions button:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #000;
        }

        .modal-box .modal-actions .btn-confirm {
            background: var(--bundesliga-red);
            color: white;
        }

        .modal-box .modal-actions .btn-cancel {
            background: #fff;
            color: var(--ink);
        }

        @media (max-width: 480px) {
            #app {
                padding: 20px 14px 26px;
            }
            .card {
                font-size: 18px;
                padding: 24px 16px;
            }
            .card-actions button {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>
            <span>📋 Thesen</span>
            <span class="phase-badge" id="phaseBadge">Laden…</span>
        </h1>
        <hr />

        <!-- Phase: Sammeln -->
        <div id="phaseCollect">
            <div class="input-group">
                <input type="text" id="thesisInput" placeholder="Neue These eingeben …" maxlength="200" />
                <button id="addThesisBtn">+ Hinzufügen</button>
            </div>
            <ul class="theses-list" id="thesesList"></ul>
        </div>

        <!-- Phase: Voten -->
        <div id="phaseVote" style="display:none;">
            <div class="card-area" id="cardArea">
                <div class="card" id="card">
                    <span class="card-text" id="cardText">Keine Thesen zum Voten</span>
                </div>
            </div>
            <div class="card-actions" id="cardActions">
                <button class="btn-dislike" id="dislikeBtn">✕</button>
                <button class="btn-like" id="likeBtn">✓</button>
            </div>
            <div class="vote-counter" id="voteCounter">Noch <span id="remainingCount">0</span> Thesen</div>
        </div>

        <!-- Phase: Ergebnis -->
        <div id="phaseResult" style="display:none;">
            <p style="color:#64748b; margin-bottom:12px;">🏆 Die Top‑12 Thesen nach Stimmen</p>
            <ol class="ranking" id="rankingList"></ol>
            <button class="export-btn" id="exportResultBtn">📥 Rasenschach‑JSON exportieren</button>
        </div>

        <!-- Admin -->
        <div class="admin-area">
            <button class="admin-toggle" id="adminToggle">⚙️ Admin</button>
            <div class="admin-panel" id="adminPanel">
                <label for="phaseSelect">Phase:</label>
                <select id="phaseSelect">
                    <option value="collect">Sammeln</option>
                    <option value="vote">Voten</option>
                    <option value="result">Ergebnis</option>
                </select>
                <button id="applyPhaseBtn">Anwenden</button>
                <button class="reset-btn" id="resetVotesBtn">🔄 Abstimmung zurücksetzen (lokal)</button>
            </div>
        </div>

        <div class="footer">Daten werden zentral in Firebase gespeichert.</div>
    </div>

    <!-- Modal für Admin-Passwort -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h2>🔐 Admin-Zugang</h2>
            <p style="color:#64748b; font-size:14px;">Bitte gib das Passwort ein:</p>
            <input type="password" id="modalPassword" placeholder="Passwort" />
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">Abbrechen</button>
                <button class="btn-confirm" id="modalConfirm">Bestätigen</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE KONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAUErqPmzSjhrLP40hVMi8t5WEtePx_Gwg",
            authDomain: "thesen-20af7.firebaseapp.com",
            databaseURL: "https://thesen-20af7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "thesen-20af7",
            storageBucket: "thesen-20af7.firebasestorage.app",
            messagingSenderId: "923852779228",
            appId: "1:923852779228:web:8ff45ac0e5ae5c34054e19",
            measurementId: "G-RNSE10FKR2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ==================== SESSION ID (für eigene Thesen) ====================
        function getSessionId() {
            let sid = localStorage.getItem('voting_session_id');
            if (!sid) {
                sid = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2);
                localStorage.setItem('voting_session_id', sid);
            }
            return sid;
        }
        const sessionId = getSessionId();

        // ==================== PERSISTENTE seenIds (lokal) ====================
        const SEEN_IDS_KEY = 'voting_seen_ids';

        function loadSeenIds() {
            try {
                const raw = localStorage.getItem(SEEN_IDS_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function saveSeenIds() {
            localStorage.setItem(SEEN_IDS_KEY, JSON.stringify(seenIds));
        }

        // ==================== GLOBALE DATEN ====================
        let allTheses = [];
        let currentPhase = 'collect';
        let seenIds = loadSeenIds(); // persistent
        let voteQueue = [];
        let currentIndex = 0;

        const ADMIN_PASSWORD = 'admin123';
        let adminAuthenticated = false;

        // DOM-Referenzen
        const phaseBadge = document.getElementById('phaseBadge');
        const phaseCollect = document.getElementById('phaseCollect');
        const phaseVote = document.getElementById('phaseVote');
        const phaseResult = document.getElementById('phaseResult');
        const thesesList = document.getElementById('thesesList');
        const thesisInput = document.getElementById('thesisInput');
        const addBtn = document.getElementById('addThesisBtn');
        const card = document.getElementById('card');
        const cardText = document.getElementById('cardText');
        const dislikeBtn = document.getElementById('dislikeBtn');
        const likeBtn = document.getElementById('likeBtn');
        const cardActions = document.getElementById('cardActions');
        const remainingCount = document.getElementById('remainingCount');
        const rankingList = document.getElementById('rankingList');
        const adminToggle = document.getElementById('adminToggle');
        const adminPanel = document.getElementById('adminPanel');
        const phaseSelect = document.getElementById('phaseSelect');
        const applyPhaseBtn = document.getElementById('applyPhaseBtn');
        const exportResultBtn = document.getElementById('exportResultBtn');
        const resetVotesBtn = document.getElementById('resetVotesBtn');

        // Modal-Elemente
        const adminModal = document.getElementById('adminModal');
        const modalPassword = document.getElementById('modalPassword');
        const modalConfirm = document.getElementById('modalConfirm');
        const modalCancel = document.getElementById('modalCancel');

        // ==================== FIREBASE LISTENER ====================
        database.ref('phase').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val && ['collect', 'vote', 'result'].includes(val)) {
                currentPhase = val;
            } else {
                currentPhase = 'collect';
                database.ref('phase').set('collect');
            }
            updateUI();
        });

        database.ref('theses').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                allTheses = Object.keys(data).map(key => ({
                    id: key,
                    text: data[key].text || '',
                    votes: data[key].votes || 0,
                    creatorId: data[key].creatorId || null
                }));
            } else {
                allTheses = [];
            }
            allTheses.sort((a, b) => b.votes - a.votes || a.text.localeCompare(b.text));
            updateUI();
        });

        // ==================== UI AKTUALISIEREN ====================
        function updateUI() {
            updateBadge();
            renderPhase();
            renderCollectList();
            renderVoteCard();
            renderRanking();
            updateAdminSelect();
        }

        function updateBadge() {
            const map = { collect: '📝 Sammeln', vote: '👆 Voten', result: '🏆 Top 12' };
            phaseBadge.textContent = map[currentPhase] || currentPhase;
        }

        function renderPhase() {
            phaseCollect.style.display = 'none';
            phaseVote.style.display = 'none';
            phaseResult.style.display = 'none';
            if (currentPhase === 'collect') phaseCollect.style.display = 'block';
            else if (currentPhase === 'vote') {
                phaseVote.style.display = 'block';
                if (voteQueue.length === 0) buildVoteQueue();
                renderVoteCard();
            } else if (currentPhase === 'result') {
                phaseResult.style.display = 'block';
            }
        }

        function renderCollectList() {
            const list = thesesList;
            if (allTheses.length === 0) {
                list.innerHTML = '<li class="empty-msg">Noch keine Thesen eingereicht.</li>';
                return;
            }
            const isAdmin = adminAuthenticated;
            list.innerHTML = allTheses.map(t => {
                const canDelete = isAdmin || (t.creatorId === sessionId);
                return `
                    <li>
                        <span>${escapeHtml(t.text)}</span>
                        <button class="delete-btn ${canDelete ? '' : 'disabled'}" data-id="${t.id}" ${canDelete ? '' : 'disabled'}>
                            ✕
                        </button>
                    </li>
                `;
            }).join('');
            list.querySelectorAll('.delete-btn:not(.disabled)').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    if (currentPhase === 'collect') {
                        if (adminAuthenticated || allTheses.find(t => t.id === id)?.creatorId === sessionId) {
                            database.ref('theses/' + id).remove();
                        }
                    }
                });
            });
        }

        function addThesis() {
            if (currentPhase !== 'collect') return;
            const text = thesisInput.value.trim();
            if (!text) return;
            if (allTheses.length >= 200) {
                alert('Maximal 200 Thesen erlaubt.');
                return;
            }
            database.ref('theses').push({
                text: text,
                votes: 0,
                creatorId: sessionId
            });
            thesisInput.value = '';
        }

        // ==================== VOTING ====================
        function buildVoteQueue() {
            // Nur Thesen, die noch nicht in seenIds sind
            const unseen = allTheses.filter(t => !seenIds.includes(t.id));
            // Zufällige Reihenfolge
            for (let i = unseen.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [unseen[i], unseen[j]] = [unseen[j], unseen[i]];
            }
            voteQueue = unseen;
            currentIndex = 0;
        }

        function renderVoteCard() {
            if (currentPhase !== 'vote') return;

            const hasMore = voteQueue.length > 0 && currentIndex < voteQueue.length;

            if (!hasMore) {
                cardText.textContent = '🎉 Alle Thesen wurden bewertet!';
                card.style.transform = '';
                card.style.opacity = '1';
                card.className = 'card';
                remainingCount.textContent = '0';
                cardActions.classList.add('hidden');
                return;
            }

            const thesis = voteQueue[currentIndex];
            cardText.textContent = thesis.text;
            card.style.transform = '';
            card.style.opacity = '1';
            card.className = 'card';
            remainingCount.textContent = voteQueue.length - currentIndex;
            cardActions.classList.remove('hidden');
        }

        function voteThesis(decision) {
            if (currentPhase !== 'vote') return;
            if (voteQueue.length === 0 || currentIndex >= voteQueue.length) return;

            const thesis = voteQueue[currentIndex];
            if (decision === 'like') {
                const ref = database.ref('theses/' + thesis.id + '/votes');
                ref.transaction((currentVotes) => (currentVotes || 0) + 1);
            }
            // Als gesehen markieren und speichern
            if (!seenIds.includes(thesis.id)) {
                seenIds.push(thesis.id);
                saveSeenIds();
            }
            currentIndex++;
            renderVoteCard();
        }

        // ==================== BUTTON-EVENTS (kein Swipe) ====================
        function initVoteButtons() {
            dislikeBtn.addEventListener('click', function() {
                if (currentPhase !== 'vote') return;
                if (voteQueue.length === 0 || currentIndex >= voteQueue.length) return;
                card.className = 'card swiped-left';
                setTimeout(() => voteThesis('dislike'), 300);
            });

            likeBtn.addEventListener('click', function() {
                if (currentPhase !== 'vote') return;
                if (voteQueue.length === 0 || currentIndex >= voteQueue.length) return;
                card.className = 'card swiped-right';
                setTimeout(() => voteThesis('like'), 300);
            });
        }

        // ==================== RANKING & EXPORT ====================
        function renderRanking() {
            if (currentPhase !== 'result') return;
            const top12 = allTheses.slice(0, 12);
            const list = rankingList;
            if (top12.length === 0) {
                list.innerHTML = '<li class="empty-msg">Noch keine Thesen vorhanden.</li>';
                return;
            }
            list.innerHTML = top12.map((t, i) => {
                let rankClass = '';
                if (i === 0) rankClass = 'gold';
                else if (i === 1) rankClass = 'silver';
                else if (i === 2) rankClass = 'bronze';
                return `
                    <li>
                        <span class="rank ${rankClass}">#${i+1}</span>
                        <span class="text">${escapeHtml(t.text)}</span>
                        <span class="votes">${t.votes}</span>
                    </li>
                `;
            }).join('');
        }

        // NEUE EXPORT-FUNKTION IM RASENSCHACH-FORMAT
        function exportRasenschach() {
            // Alle Thesentexte (nicht nur Top 12) aus allTheses extrahieren
            const thesesTexts = allTheses.map(t => t.text);

            // Statische Vorlage aus der Beispiel-JSON – nur das theses-Array und exportedAt werden dynamisch gesetzt
            const template = {
                "app": "rasenschach",
                "version": 3,
                "exportedAt": new Date().toISOString(),
                "data": {
                    "theses": thesesTexts,
                    "positions": [
                        {"id":1,"side":null,"piece":null,"knightSwing":-1,"polarity":null},
                        {"id":2,"side":null,"piece":null,"knightSwing":1,"polarity":null},
                        {"id":3,"side":null,"piece":null,"knightSwing":1,"polarity":null},
                        {"id":4,"side":null,"piece":null,"knightSwing":-1,"polarity":null},
                        {"id":5,"side":null,"piece":null,"knightSwing":-1,"polarity":null},
                        {"id":6,"side":null,"piece":null,"knightSwing":-1,"polarity":null},
                        {"id":7,"side":null,"piece":null,"knightSwing":1,"polarity":null},
                        {"id":8,"side":null,"piece":null,"knightSwing":1,"polarity":null},
                        {"id":9,"side":null,"piece":null,"knightSwing":1,"polarity":null},
                        {"id":10,"side":null,"piece":null,"knightSwing":-1,"polarity":null},
                        {"id":11,"side":null,"piece":null,"knightSwing":-1,"polarity":null},
                        {"id":12,"side":null,"piece":null,"knightSwing":1,"polarity":null}
                    ],
                    "names": {"white":"","black":""},
                    "results": {
                        "white": {"rook":0,"bishop":0,"knight":0,"queen":0,"king":0},
                        "black": {"rook":0,"bishop":0,"knight":0,"queen":0,"king":0}
                    },
                    "questionValue": null,
                    "figureImages": {},
                    "teamLogos": {"white":null,"black":null}
                }
            };

            const json = JSON.stringify(template, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            // Dateiname wie im Beispiel: rasenschach-speicherstand-YYYY-MM-DD-HH-MM-SS.json
            const now = new Date();
            const dateStr = now.toISOString().slice(0,10);
            const timeStr = now.toTimeString().slice(0,8).replace(/:/g, '-');
            a.download = `rasenschach-speicherstand-${dateStr}-${timeStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==================== ADMIN ====================
        function openAdminModal() {
            adminModal.classList.add('active');
            modalPassword.value = '';
            modalPassword.focus();
        }

        function closeAdminModal() {
            adminModal.classList.remove('active');
        }

        function handleAdminAuth() {
            const pwd = modalPassword.value.trim();
            if (pwd === ADMIN_PASSWORD) {
                adminAuthenticated = true;
                closeAdminModal();
                adminPanel.classList.add('open');
                updateAdminSelect();
                renderCollectList();
                alert('✅ Admin erfolgreich authentifiziert.');
            } else {
                alert('❌ Falsches Passwort.');
                modalPassword.value = '';
                modalPassword.focus();
            }
        }

        function setPhase(phase) {
            if (!adminAuthenticated) {
                alert('Bitte zuerst als Admin authentifizieren.');
                return;
            }
            if (!['collect', 'vote', 'result'].includes(phase)) return;
            database.ref('phase').set(phase);
            // seenIds NICHT zurücksetzen – bleibt erhalten
            // aber bei Wechsel zu Vote: Queue neu aufbauen
            if (phase === 'vote') {
                // seenIds bleiben wie sie sind
                voteQueue = [];
                currentIndex = 0;
                buildVoteQueue();
            }
            adminPanel.classList.remove('open');
        }

        function resetLocalVotes() {
            if (!adminAuthenticated) {
                alert('Nur Admin kann lokale Abstimmung zurücksetzen.');
                return;
            }
            if (confirm('Möchtest du wirklich deine lokale Abstimmung zurücksetzen? Du kannst dann alle Thesen erneut bewerten.')) {
                seenIds = [];
                saveSeenIds();
                voteQueue = [];
                currentIndex = 0;
                buildVoteQueue();
                renderVoteCard();
                alert('Lokale Abstimmung zurückgesetzt.');
            }
        }

        function updateAdminSelect() {
            phaseSelect.value = currentPhase;
        }

        // ==================== EVENT LISTENER ====================
        addBtn.addEventListener('click', addThesis);
        thesisInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addThesis(); });

        adminToggle.addEventListener('click', () => {
            if (adminAuthenticated) {
                adminPanel.classList.toggle('open');
            } else {
                openAdminModal();
            }
        });

        applyPhaseBtn.addEventListener('click', () => setPhase(phaseSelect.value));
        resetVotesBtn.addEventListener('click', resetLocalVotes);

        modalConfirm.addEventListener('click', handleAdminAuth);
        modalCancel.addEventListener('click', closeAdminModal);
        modalPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleAdminAuth();
            if (e.key === 'Escape') closeAdminModal();
        });
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) closeAdminModal();
        });

        // Export-Button ruft jetzt die neue Funktion auf
        exportResultBtn.addEventListener('click', exportRasenschach);

        // Tastatur-Shortcuts für Voten (nur wenn Buttons sichtbar)
        document.addEventListener('keydown', (e) => {
            if (currentPhase !== 'vote') return;
            if (cardActions.classList.contains('hidden')) return;
            if (e.key === 'ArrowLeft') dislikeBtn.click();
            else if (e.key === 'ArrowRight') likeBtn.click();
        });

        // ==================== INIT ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        initVoteButtons();
        database.ref('phase').once('value', (snap) => {
            if (!snap.val()) database.ref('phase').set('collect');
        });

        console.log('🔥 Thesen-Voting mit Firebase gestartet. Session-ID:', sessionId);
        console.log('Bereits gesehene Thesen:', seenIds.length);
    </script>
</body>
</html>
