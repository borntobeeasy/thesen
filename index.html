<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Thesen · Rasenschach</title>
  <!-- Favicon (aus Datei favicon.png) -->
  <link rel="icon" href="favicon.png" />
  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    /* ============================================================
       TOKENS – Dark Mode, keine Emojis
       ============================================================ */
    :root {
      --bg: #0a0a0a;
      --surface: rgba(20, 20, 20, 0.88);
      --surface-light: rgba(40, 40, 40, 0.75);
      --ink: #f0f0f0;
      --steel: #b0b0b0;
      --line: #ffffff;
      --hard-shadow: 4px 4px 0 rgba(255,255,255,0.15);
      --hard-shadow-sm: 2px 2px 0 rgba(255,255,255,0.12);
      --red: #e2001a;
      --gold: #ffcc00;
      --blue: #2a6bb0;
      --green: #2e9e5a;
      --border: 2px solid rgba(255,255,255,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      color: var(--ink);
    }

    /* ============================
       HINTERGRUND-CANVAS (30 Bilder aus grafiken/data/)
       ============================ */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }

    #app {
      max-width: 480px;
      width: 100%;
      background: var(--surface);
      border-radius: 28px;
      border: var(--border);
      box-shadow: var(--hard-shadow);
      padding: 24px 20px 28px;
      position: relative;
      backdrop-filter: blur(6px);
      z-index: 1;
      min-height: 80vh;
    }

    /* ============================
       KOPF – ohne Emojis
       ============================ */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: var(--border);
    }
    .app-header h1 {
      font-family: 'Anton', 'Arial Narrow', Impact, sans-serif;
      font-style: italic;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--ink);
      text-shadow: 2px 2px 0 var(--red), 4px 4px 0 rgba(255,255,255,0.1);
      margin: 0;
    }
    .phase-badge {
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--red);
      color: #fff;
      padding: 4px 14px;
      border-radius: 40px;
      border: var(--border);
      box-shadow: var(--hard-shadow-sm);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ============================
       ALLGEMEINE ELEMENTE
       ============================ */
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .input-group input {
      flex: 1;
      padding: 12px 16px;
      border: var(--border);
      border-radius: 40px;
      font-size: 16px;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: var(--ink);
      box-shadow: var(--hard-shadow-sm);
    }
    .input-group input:focus {
      border-color: var(--blue);
      box-shadow: 3px 3px 0 rgba(255,255,255,0.08);
    }
    .input-group input::placeholder {
      color: var(--steel);
      opacity: 0.7;
    }
    .input-group button {
      padding: 12px 24px;
      background: var(--blue);
      color: #fff;
      border: var(--border);
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--hard-shadow-sm);
      transition: transform 0.08s, box-shadow 0.08s;
      white-space: nowrap;
    }
    .input-group button:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 rgba(255,255,255,0.1);
    }
    .input-group button:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .theses-list {
      list-style: none;
      margin-top: 8px;
    }
    .theses-list li {
      background: var(--surface-light);
      padding: 14px 16px;
      border-radius: 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: var(--border);
      word-break: break-word;
      color: var(--ink);
      box-shadow: var(--hard-shadow-sm);
    }
    .theses-list li .delete-btn {
      background: none;
      border: none;
      color: var(--steel);
      font-size: 20px;
      cursor: pointer;
      padding: 0 6px;
      transition: color 0.2s;
      font-weight: 700;
    }
    .theses-list li .delete-btn:hover { color: var(--red); }
    .theses-list li .delete-btn.disabled {
      color: #555;
      cursor: not-allowed;
      pointer-events: none;
    }
    .empty-msg {
      color: var(--steel);
      text-align: center;
      padding: 30px 0;
      font-style: italic;
    }

    /* ============================
       VOTE-CARD (Tinder‑Style)
       ============================ */
    .card-area {
      position: relative;
      height: 380px;
      margin: 16px 0 20px;
      touch-action: none;
    }
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(30, 30, 30, 0.92);
      border-radius: 28px;
      box-shadow: var(--hard-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      text-align: center;
      border: var(--border);
      transition: transform 0.3s ease, opacity 0.3s ease;
      cursor: default;
      user-select: none;
      line-height: 1.5;
    }
    .card.swiped-left {
      transform: translateX(-120%) rotate(-12deg);
      opacity: 0;
    }
    .card.swiped-right {
      transform: translateX(120%) rotate(12deg);
      opacity: 0;
    }
    .card .card-text { pointer-events: none; }

    .card-actions {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 8px;
    }
    .card-actions.hidden { display: none; }
    .card-actions button {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: var(--border);
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: var(--hard-shadow-sm);
      background: rgba(20,20,20,0.8);
      color: var(--ink);
    }
    .card-actions button:active { transform: scale(0.90); }
    .btn-dislike { color: var(--red); }
    .btn-dislike:hover { background: rgba(226,0,26,0.15); }
    .btn-like { color: var(--green); }
    .btn-like:hover { background: rgba(46,158,90,0.15); }

    .vote-counter {
      text-align: center;
      margin-top: 8px;
      color: var(--steel);
      font-size: 14px;
    }
    .vote-counter span { font-weight: 700; color: var(--ink); }

    /* ============================
       RANKING / ERGEBNIS
       ============================ */
    .ranking {
      list-style: none;
      margin-top: 8px;
    }
    .ranking li {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface-light);
      border-radius: 16px;
      margin-bottom: 8px;
      border: var(--border);
      color: var(--ink);
      box-shadow: var(--hard-shadow-sm);
    }
    .ranking .rank {
      font-weight: 700;
      font-size: 18px;
      color: var(--blue);
      min-width: 32px;
      text-align: center;
    }
    .ranking .rank.gold { color: var(--gold); }
    .ranking .rank.silver { color: #a0a0a0; }
    .ranking .rank.bronze { color: #cd7f32; }
    .ranking .text { flex: 1; word-break: break-word; }
    .ranking .votes {
      font-weight: 600;
      color: var(--steel);
      background: rgba(255,255,255,0.08);
      padding: 2px 14px;
      border-radius: 40px;
      font-size: 14px;
      border: var(--border);
    }

    .export-btn {
      display: block;
      margin: 16px auto 0;
      padding: 10px 24px;
      background: var(--green);
      color: #fff;
      border: var(--border);
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--hard-shadow-sm);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .export-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(255,255,255,0.1); }

    /* ============================
       ADMIN
       ============================ */
    .admin-area {
      margin-top: 28px;
      border-top: var(--border);
      padding-top: 20px;
    }
    .admin-toggle {
      background: none;
      border: var(--border);
      color: var(--steel);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 40px;
      transition: background 0.2s;
      background: rgba(255,255,255,0.04);
    }
    .admin-toggle:hover { background: rgba(255,255,255,0.08); }
    .admin-panel {
      display: none;
      background: var(--surface-light);
      padding: 16px;
      border-radius: 20px;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      border: var(--border);
    }
    .admin-panel.open { display: flex; }
    .admin-panel label {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
    }
    .admin-panel select {
      padding: 8px 16px;
      border-radius: 40px;
      border: var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      font-size: 14px;
      flex: 1;
      min-width: 120px;
    }
    .admin-panel select option { background: #1a1a1a; }
    .admin-panel button {
      padding: 8px 18px;
      background: var(--blue);
      color: #fff;
      border: var(--border);
      border-radius: 40px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--hard-shadow-sm);
      transition: 0.08s;
    }
    .admin-panel button:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(255,255,255,0.08); }
    .admin-panel .reset-btn { background: var(--red); }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: var(--steel);
      text-align: center;
    }

    /* ============================
       MODAL
       ============================ */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #1a1a1a;
      padding: 32px 28px;
      border-radius: 24px;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      text-align: center;
      border: var(--border);
    }
    .modal-box h2 {
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--ink);
    }
    .modal-box input {
      width: 100%;
      padding: 12px 16px;
      border: var(--border);
      border-radius: 40px;
      font-size: 16px;
      margin: 12px 0 16px;
      outline: none;
      background: rgba(255,255,255,0.06);
      color: var(--ink);
    }
    .modal-box input:focus { border-color: var(--blue); }
    .modal-box .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .modal-box .modal-actions button {
      padding: 10px 24px;
      border: var(--border);
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.08s;
      box-shadow: var(--hard-shadow-sm);
    }
    .modal-box .modal-actions .btn-confirm {
      background: var(--blue);
      color: #fff;
    }
    .modal-box .modal-actions .btn-cancel {
      background: #333;
      color: var(--steel);
    }
    .modal-box .modal-actions button:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(255,255,255,0.08); }

    /* ============================
       MOBILE
       ============================ */
    @media (max-width: 480px) {
      #app { padding: 16px; border-radius: 20px; }
      .card { font-size: 18px; padding: 24px 16px; }
      .card-actions button { width: 60px; height: 60px; font-size: 22px; }
      .app-header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <!-- HINTERGRUND-CANVAS (wird per JS befüllt) -->
  <canvas id="bgCanvas"></canvas>

  <div id="app">
    <!-- Kopf mit Phasen-Badge -->
    <div class="app-header">
      <h1>Thesen</h1>
      <span class="phase-badge" id="phaseBadge">Laden…</span>
    </div>

    <!-- Phase: Sammeln -->
    <div id="phaseCollect">
      <div class="input-group">
        <input type="text" id="thesisInput" placeholder="Neue These eingeben …" maxlength="200" />
        <button id="addThesisBtn">+ Hinzufügen</button>
      </div>
      <ul class="theses-list" id="thesesList"></ul>
    </div>

    <!-- Phase: Voten -->
    <div id="phaseVote" style="display:none;">
      <div class="card-area" id="cardArea">
        <div class="card" id="card">
          <span class="card-text" id="cardText">Keine Thesen zum Voten</span>
        </div>
      </div>
      <div class="card-actions" id="cardActions">
        <button class="btn-dislike" id="dislikeBtn">✕</button>
        <button class="btn-like" id="likeBtn">✓</button>
      </div>
      <div class="vote-counter">Noch <span id="remainingCount">0</span> Thesen</div>
    </div>

    <!-- Phase: Ergebnis -->
    <div id="phaseResult" style="display:none;">
      <p style="color:var(--steel); margin-bottom:12px;">Die Top‑12 Thesen nach Stimmen</p>
      <ol class="ranking" id="rankingList"></ol>
      <button class="export-btn" id="exportResultBtn">Top‑12 als JSON herunterladen</button>
    </div>

    <!-- Admin -->
    <div class="admin-area">
      <button class="admin-toggle" id="adminToggle">⚙️ Admin</button>
      <div class="admin-panel" id="adminPanel">
        <label for="phaseSelect">Phase:</label>
        <select id="phaseSelect">
          <option value="collect">Sammeln</option>
          <option value="vote">Voten</option>
          <option value="result">Ergebnis</option>
        </select>
        <button id="applyPhaseBtn">Anwenden</button>
        <button class="reset-btn" id="resetVotesBtn">Abstimmung zurücksetzen (lokal)</button>
      </div>
    </div>

    <div class="footer">Daten werden zentral in Firebase gespeichert.</div>
  </div>

  <!-- Modal für Admin-Passwort -->
  <div class="modal-overlay" id="adminModal">
    <div class="modal-box">
      <h2>Admin-Zugang</h2>
      <p style="color:var(--steel); font-size:14px;">Bitte gib das Passwort ein:</p>
      <input type="password" id="modalPassword" placeholder="Passwort" />
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">Abbrechen</button>
        <button class="btn-confirm" id="modalConfirm">Bestätigen</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== HINTERGRUND (Canvas) ====================
    (function initBackground() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const BG_COUNT = 30;
      const BG_PATH = 'grafiken/data/';
      const loaded = [];

      let loadedCount = 0;
      for (let i = 1; i <= BG_COUNT; i++) {
        const img = new Image();
        img.src = BG_PATH + i + '.png';
        img.onload = () => {
          loaded.push(img);
          loadedCount++;
          if (loadedCount === BG_COUNT) startAnimation();
        };
        img.onerror = () => {
          loadedCount++;
          if (loadedCount === BG_COUNT) startAnimation();
        };
      }

      // Fallback
      setTimeout(() => {
        if (loaded.length === 0) {
          console.warn('Keine Hintergrundbilder geladen – starte trotzdem.');
          startAnimation();
        }
      }, 3000);

      function startAnimation() {
        if (loaded.length === 0) return;
        const maxWidth = 120;
        const gap = 12;
        const speedBase = 0.3;
        const speedVariance = 0.15;

        const images = loaded.map(img => {
          const scale = Math.min(1, maxWidth / img.width);
          return { img, w: img.width * scale, h: img.height * scale };
        });

        const rows = 4;
        const perRow = Math.ceil(images.length / rows);
        let idx = 0;
        const rowData = [];

        for (let r = 0; r < rows; r++) {
          const row = [];
          for (let c = 0; c < perRow; c++) {
            if (idx >= images.length) break;
            row.push(images[idx++]);
          }
          if (!row.length) continue;
          let totalW = 0;
          row.forEach((im, i) => { totalW += im.w; if (i < row.length-1) totalW += gap; });
          const dir = (r % 2 === 0) ? 1 : -1;
          const speed = dir * (speedBase + (Math.random()-0.5)*speedVariance);
          const positions = [];
          let x = 0;
          for (let i = 0; i < row.length; i++) { positions.push(x); x += row[i].w + gap; }
          const y = (r / (rows-1)) * (canvas.height - row[0].h);
          rowData.push({
            images: row,
            y: Math.min(y, canvas.height - row[0].h),
            speed,
            positions,
            totalWidth: totalW,
            offset: 0,
          });
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (const rd of rowData) {
            rd.offset += rd.speed;
            rd.offset = ((rd.offset % rd.totalWidth) + rd.totalWidth) % rd.totalWidth;
            for (let i = 0; i < rd.images.length; i++) {
              const im = rd.images[i];
              const baseX = rd.positions[i];
              for (let copy = -1; copy <= 1; copy++) {
                let x = baseX + rd.offset + copy * rd.totalWidth;
                if (x + im.w > -50 && x < canvas.width + 50) {
                  ctx.save();
                  ctx.globalAlpha = 0.35;
                  ctx.drawImage(im.img, x, rd.y, im.w, im.h);
                  ctx.restore();
                }
              }
            }
          }
          requestAnimationFrame(animate);
        }
        animate();
      }
    })();

    // ==================== FIREBASE & VOTING-LOGIK ====================
    const firebaseConfig = {
      apiKey: "AIzaSyAUErqPmzSjhrLP40hVMi8t5WEtePx_Gwg",
      authDomain: "thesen-20af7.firebaseapp.com",
      databaseURL: "https://thesen-20af7-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "thesen-20af7",
      storageBucket: "thesen-20af7.firebasestorage.app",
      messagingSenderId: "923852779228",
      appId: "1:923852779228:web:8ff45ac0e5ae5c34054e19",
      measurementId: "G-RNSE10FKR2"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Session-ID für eigene Thesen
    function getSessionId() {
      let sid = localStorage.getItem('voting_session_id');
      if (!sid) {
        sid = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2);
        localStorage.setItem('voting_session_id', sid);
      }
      return sid;
    }
    const sessionId = getSessionId();

    const SEEN_IDS_KEY = 'voting_seen_ids';
    function loadSeenIds() {
      try { return JSON.parse(localStorage.getItem(SEEN_IDS_KEY)) || []; } catch { return []; }
    }
    function saveSeenIds() { localStorage.setItem(SEEN_IDS_KEY, JSON.stringify(seenIds)); }

    let allTheses = [];
    let currentPhase = 'collect';
    let seenIds = loadSeenIds();
    let voteQueue = [];
    let currentIndex = 0;

    const ADMIN_PASSWORD = 'admin123';
    let adminAuthenticated = false;

    // DOM-Referenzen
    const phaseBadge = document.getElementById('phaseBadge');
    const phaseCollect = document.getElementById('phaseCollect');
    const phaseVote = document.getElementById('phaseVote');
    const phaseResult = document.getElementById('phaseResult');
    const thesesList = document.getElementById('thesesList');
    const thesisInput = document.getElementById('thesisInput');
    const addBtn = document.getElementById('addThesisBtn');
    const card = document.getElementById('card');
    const cardText = document.getElementById('cardText');
    const dislikeBtn = document.getElementById('dislikeBtn');
    const likeBtn = document.getElementById('likeBtn');
    const cardActions = document.getElementById('cardActions');
    const remainingCount = document.getElementById('remainingCount');
    const rankingList = document.getElementById('rankingList');
    const adminToggle = document.getElementById('adminToggle');
    const adminPanel = document.getElementById('adminPanel');
    const phaseSelect = document.getElementById('phaseSelect');
    const applyPhaseBtn = document.getElementById('applyPhaseBtn');
    const exportResultBtn = document.getElementById('exportResultBtn');
    const resetVotesBtn = document.getElementById('resetVotesBtn');
    const adminModal = document.getElementById('adminModal');
    const modalPassword = document.getElementById('modalPassword');
    const modalConfirm = document.getElementById('modalConfirm');
    const modalCancel = document.getElementById('modalCancel');

    // Firebase Listener
    database.ref('phase').on('value', (snap) => {
      const val = snap.val();
      if (val && ['collect', 'vote', 'result'].includes(val)) currentPhase = val;
      else { currentPhase = 'collect'; database.ref('phase').set('collect'); }
      updateUI();
    });

    database.ref('theses').on('value', (snap) => {
      const data = snap.val();
      if (data) {
        allTheses = Object.keys(data).map(key => ({
          id: key,
          text: data[key].text || '',
          votes: data[key].votes || 0,
          creatorId: data[key].creatorId || null
        }));
      } else allTheses = [];
      allTheses.sort((a, b) => b.votes - a.votes || a.text.localeCompare(b.text));
      updateUI();
    });

    function updateUI() {
      updateBadge();
      renderPhase();
      renderCollectList();
      renderVoteCard();
      renderRanking();
      updateAdminSelect();
    }

    function updateBadge() {
      const map = { collect: 'Sammeln', vote: 'Voten', result: 'Top 12' };
      phaseBadge.textContent = map[currentPhase] || currentPhase;
    }

    function renderPhase() {
      phaseCollect.style.display = 'none';
      phaseVote.style.display = 'none';
      phaseResult.style.display = 'none';
      if (currentPhase === 'collect') phaseCollect.style.display = 'block';
      else if (currentPhase === 'vote') {
        phaseVote.style.display = 'block';
        if (voteQueue.length === 0) buildVoteQueue();
        renderVoteCard();
      } else if (currentPhase === 'result') {
        phaseResult.style.display = 'block';
      }
    }

    function renderCollectList() {
      const list = thesesList;
      if (!allTheses.length) {
        list.innerHTML = '<li class="empty-msg">Noch keine Thesen eingereicht.</li>';
        return;
      }
      const isAdmin = adminAuthenticated;
      list.innerHTML = allTheses.map(t => {
        const canDelete = isAdmin || (t.creatorId === sessionId);
        return `<li>
          <span>${escapeHtml(t.text)}</span>
          <button class="delete-btn ${canDelete ? '' : 'disabled'}" data-id="${t.id}" ${canDelete ? '' : 'disabled'}>✕</button>
        </li>`;
      }).join('');
      list.querySelectorAll('.delete-btn:not(.disabled)').forEach(btn => {
        btn.addEventListener('click', function() {
          const id = this.dataset.id;
          if (currentPhase === 'collect' && (adminAuthenticated || allTheses.find(t => t.id === id)?.creatorId === sessionId)) {
            database.ref('theses/' + id).remove();
          }
        });
      });
    }

    function addThesis() {
      if (currentPhase !== 'collect') return;
      const text = thesisInput.value.trim();
      if (!text) return;
      if (allTheses.length >= 200) { alert('Maximal 200 Thesen erlaubt.'); return; }
      database.ref('theses').push({ text, votes: 0, creatorId: sessionId });
      thesisInput.value = '';
    }

    function buildVoteQueue() {
      const unseen = allTheses.filter(t => !seenIds.includes(t.id));
      for (let i = unseen.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [unseen[i], unseen[j]] = [unseen[j], unseen[i]];
      }
      voteQueue = unseen;
      currentIndex = 0;
    }

    function renderVoteCard() {
      if (currentPhase !== 'vote') return;
      const hasMore = voteQueue.length > 0 && currentIndex < voteQueue.length;
      if (!hasMore) {
        cardText.textContent = 'Alle Thesen wurden bewertet!';
        card.className = 'card';
        remainingCount.textContent = '0';
        cardActions.classList.add('hidden');
        return;
      }
      const thesis = voteQueue[currentIndex];
      cardText.textContent = thesis.text;
      card.className = 'card';
      remainingCount.textContent = voteQueue.length - currentIndex;
      cardActions.classList.remove('hidden');
    }

    function voteThesis(decision) {
      if (currentPhase !== 'vote' || voteQueue.length === 0 || currentIndex >= voteQueue.length) return;
      const thesis = voteQueue[currentIndex];
      if (decision === 'like') {
        database.ref('theses/' + thesis.id + '/votes').transaction((v) => (v || 0) + 1);
      }
      if (!seenIds.includes(thesis.id)) { seenIds.push(thesis.id); saveSeenIds(); }
      currentIndex++;
      renderVoteCard();
    }

    function initVoteButtons() {
      dislikeBtn.addEventListener('click', () => {
        if (currentPhase !== 'vote' || voteQueue.length === 0 || currentIndex >= voteQueue.length) return;
        card.className = 'card swiped-left';
        setTimeout(() => voteThesis('dislike'), 300);
      });
      likeBtn.addEventListener('click', () => {
        if (currentPhase !== 'vote' || voteQueue.length === 0 || currentIndex >= voteQueue.length) return;
        card.className = 'card swiped-right';
        setTimeout(() => voteThesis('like'), 300);
      });
    }

    function renderRanking() {
      if (currentPhase !== 'result') return;
      const top12 = allTheses.slice(0, 12);
      if (!top12.length) { rankingList.innerHTML = '<li class="empty-msg">Noch keine Thesen vorhanden.</li>'; return; }
      rankingList.innerHTML = top12.map((t, i) => {
        let rc = '';
        if (i === 0) rc = 'gold';
        else if (i === 1) rc = 'silver';
        else if (i === 2) rc = 'bronze';
        return `<li><span class="rank ${rc}">#${i+1}</span><span class="text">${escapeHtml(t.text)}</span><span class="votes">${t.votes}</span></li>`;
      }).join('');
    }

    function exportTop12() {
      const top12 = allTheses.slice(0, 12).map(t => ({ text: t.text, votes: t.votes }));
      const json = JSON.stringify(top12, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `top12-thesen-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Admin
    function openAdminModal() { adminModal.classList.add('active'); modalPassword.value = ''; modalPassword.focus(); }
    function closeAdminModal() { adminModal.classList.remove('active'); }
    function handleAdminAuth() {
      if (modalPassword.value.trim() === ADMIN_PASSWORD) {
        adminAuthenticated = true;
        closeAdminModal();
        adminPanel.classList.add('open');
        updateAdminSelect();
        renderCollectList();
        alert('Admin erfolgreich authentifiziert.');
      } else { alert('Falsches Passwort.'); modalPassword.value = ''; modalPassword.focus(); }
    }

    function setPhase(phase) {
      if (!adminAuthenticated) { alert('Bitte zuerst als Admin authentifizieren.'); return; }
      if (!['collect', 'vote', 'result'].includes(phase)) return;
      database.ref('phase').set(phase);
      if (phase === 'vote') { voteQueue = []; currentIndex = 0; buildVoteQueue(); }
      adminPanel.classList.remove('open');
    }

    function resetLocalVotes() {
      if (!adminAuthenticated) { alert('Nur Admin kann lokale Abstimmung zurücksetzen.'); return; }
      if (confirm('Möchtest du wirklich deine lokale Abstimmung zurücksetzen?')) {
        seenIds = []; saveSeenIds(); voteQueue = []; currentIndex = 0; buildVoteQueue(); renderVoteCard();
        alert('Lokale Abstimmung zurückgesetzt.');
      }
    }

    function updateAdminSelect() { phaseSelect.value = currentPhase; }
    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

    // Event-Listener
    addBtn.addEventListener('click', addThesis);
    thesisInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addThesis(); });
    adminToggle.addEventListener('click', () => { adminAuthenticated ? adminPanel.classList.toggle('open') : openAdminModal(); });
    applyPhaseBtn.addEventListener('click', () => setPhase(phaseSelect.value));
    resetVotesBtn.addEventListener('click', resetLocalVotes);
    modalConfirm.addEventListener('click', handleAdminAuth);
    modalCancel.addEventListener('click', closeAdminModal);
    modalPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAdminAuth(); if (e.key === 'Escape') closeAdminModal(); });
    adminModal.addEventListener('click', (e) => { if (e.target === adminModal) closeAdminModal(); });
    exportResultBtn.addEventListener('click', exportTop12);

    document.addEventListener('keydown', (e) => {
      if (currentPhase !== 'vote' || cardActions.classList.contains('hidden')) return;
      if (e.key === 'ArrowLeft') dislikeBtn.click();
      else if (e.key === 'ArrowRight') likeBtn.click();
    });

    initVoteButtons();
    database.ref('phase').once('value', (snap) => { if (!snap.val()) database.ref('phase').set('collect'); });

    console.log('Thesen-Voting mit Firebase gestartet. Session-ID:', sessionId);
    console.log('Bereits gesehene Thesen:', seenIds.length);
  </script>
</body>
</html>
